# GEO Benchmark Framework — AI Evaluation Models v1.0
#
# These models form the consensus panel for benchmark evaluations.
# Each tool is evaluated by all active models; scores are synthesized
# using median aggregation. A minimum of 4/6 successful model responses
# is required for a valid score.
#
# All models are accessed via OpenRouter (https://openrouter.ai) as a
# unified gateway. Model identifiers follow OpenRouter's naming convention.

- provider: OpenAI
  model_identifier: openai/gpt-4o
  display_name: GPT-4o
  timeout_ms: 30000
  is_active: true

- provider: Anthropic
  model_identifier: anthropic/claude-sonnet-4-6
  display_name: Claude Sonnet 4.6
  timeout_ms: 30000
  is_active: true

- provider: Google
