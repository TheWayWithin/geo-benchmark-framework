  display_name: Gemini 2.0 Flash
  timeout_ms: 30000
  is_active: true

- provider: Cohere
  model_identifier: cohere/command-r-plus
  display_name: Command R+
  timeout_ms: 45000
  is_active: true

- provider: Mistral
  model_identifier: mistralai/mistral-large-latest
  display_name: Mistral Large
